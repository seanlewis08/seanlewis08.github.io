<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#FA8072"/>

  <!-- Title -->
  <text x="40" y="50" font-size="20px" font-weight="bold" fill="#1a1a1a" font-family="system-ui, sans-serif">
    HypoGeniC
  </text>

  <!-- Subtitle -->
  <text x="40" y="75" font-size="12px" fill="#0d7c5f" font-family="system-ui, sans-serif">
    Hypothesis generation with LLMs
  </text>

  <!-- Define arrow markers -->
  <defs>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0d7c5f"/>
    </marker>
  </defs>

  <!-- Circular iterative loop -->
  <!-- Center circle at 400, 220 with loop radius 90 -->

  <!-- Data node (top) -->
  <circle cx="400" cy="130" r="32" fill="white" stroke="#0d7c5f" stroke-width="2"/>
  <text x="400" y="138" font-size="12px" fill="#1a1a1a" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="500">
    Data
  </text>

  <!-- Wrong Examples node (right) -->
  <circle cx="490" cy="220" r="32" fill="white" stroke="#0d7c5f" stroke-width="2"/>
  <text x="490" y="218" font-size="11px" fill="#1a1a1a" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="500">
    Wrong
  </text>
  <text x="490" y="232" font-size="11px" fill="#1a1a1a" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="500">
    Examples
  </text>

  <!-- LLM node (bottom) -->
  <circle cx="400" cy="310" r="32" fill="white" stroke="#0d7c5f" stroke-width="2"/>
  <text x="400" y="318" font-size="12px" fill="#1a1a1a" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="500">
    LLM
  </text>

  <!-- Hypotheses node (left) -->
  <circle cx="310" cy="220" r="32" fill="white" stroke="#0d7c5f" stroke-width="2"/>
  <text x="310" y="218" font-size="11px" fill="#1a1a1a" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="500">
    Hypotheses
  </text>
  <text x="310" y="232" font-size="11px" fill="#1a1a1a" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="500">
  </text>

  <!-- Arrows connecting the loop -->
  <!-- Data → Wrong Examples -->
  <path d="M 430 155 Q 465 175 475 195" stroke="#0d7c5f" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- Wrong Examples → LLM -->
  <path d="M 475 255 Q 440 290 430 305" stroke="#0d7c5f" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- LLM → Hypotheses -->
  <path d="M 370 305 Q 335 290 325 255" stroke="#0d7c5f" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- Hypotheses → Data (closing loop) -->
  <path d="M 325 195 Q 360 155 370 140" stroke="#0d7c5f" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- UCB label on the loop (top-right side) -->
  <text x="470" y="170" font-size="11px" fill="#0d7c5f" font-family="system-ui, sans-serif" font-weight="500">
    UCB
  </text>

  <!-- Callout box: +60% -->
  <rect x="560" y="240" width="90" height="70" fill="white" stroke="#0d7c5f" stroke-width="2" rx="5"/>
  <text x="605" y="265" font-size="18px" fill="#0d7c5f" font-family="system-ui, sans-serif" text-anchor="middle" font-weight="bold">
    +60%
  </text>
  <text x="605" y="295" font-size="10px" fill="#4a4a4a" font-family="system-ui, sans-serif" text-anchor="middle">
    Shoe Sales
  </text>

  <!-- Footer -->
  <text x="40" y="425" font-size="11px" fill="#8a8a8a" font-family="system-ui, sans-serif">
    Zhou et al. (2024) · arXiv:2404.04326
  </text>
</svg>