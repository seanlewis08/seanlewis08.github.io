<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#FA8072"/>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    ReAct
  </text>

  <!-- Subtitle -->
  <text x="400" y="70" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#0d7c5f">
    Synergizing reasoning and acting
  </text>

  <!-- LEFT: CoT Only Path -->
  <g>
    <text x="180" y="105" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CoT Only</text>

    <!-- Chain boxes -->
    <rect x="150" y="120" width="60" height="35" fill="none" stroke="#4a4a4a" stroke-width="2" rx="3"/>
    <text x="180" y="142" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#4a4a4a">Step</text>

    <line x1="180" y1="160" x2="180" y2="175" stroke="#4a4a4a" stroke-width="2"/>

    <rect x="150" y="175" width="60" height="35" fill="none" stroke="#4a4a4a" stroke-width="2" rx="3"/>
    <text x="180" y="197" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" fill="#4a4a4a">Step</text>

    <line x1="180" y1="215" x2="180" y2="230" stroke="#4a4a4a" stroke-width="2"/>

    <!-- Hallucination Box -->
    <rect x="150" y="230" width="60" height="40" fill="#d4563a" rx="3"/>
    <text x="180" y="250" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Hallucination</text>
    <text x="180" y="263" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="white">56%</text>
  </g>

  <!-- RIGHT: ReAct Loop -->
  <g>
    <!-- Circle loop with three nodes -->
    <!-- Thought (top) -->
    <circle cx="550" cy="150" r="35" fill="none" stroke="#0d7c5f" stroke-width="2.5"/>
    <text x="550" y="155" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#0d7c5f">Thought</text>

    <!-- Curved arrow from Thought to Action -->
    <path d="M 580 160 Q 630 150 640 190" fill="none" stroke="#0d7c5f" stroke-width="2.5"/>
    <polygon points="640,190 636,183 644,186" fill="#0d7c5f"/>

    <!-- Action (right) -->
    <circle cx="650" cy="220" r="35" fill="none" stroke="#0d7c5f" stroke-width="2.5"/>
    <text x="650" y="228" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#0d7c5f">Action</text>

    <!-- Curved arrow from Action to Observation -->
    <path d="M 620 250 Q 550 290 510 260" fill="none" stroke="#0d7c5f" stroke-width="2.5"/>
    <polygon points="510,260 514,268 506,265" fill="#0d7c5f"/>

    <!-- Observation (bottom-left) -->
    <circle cx="480" cy="230" r="35" fill="none" stroke="#0d7c5f" stroke-width="2.5"/>
    <text x="480" y="230" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#0d7c5f">Observation</text>

    <!-- Curved arrow from Observation back to Thought -->
    <path d="M 505 200 Q 520 170 535 160" fill="none" stroke="#0d7c5f" stroke-width="2.5"/>
    <polygon points="535,160 531,167 540,164" fill="#0d7c5f"/>

    <!-- Low Error label -->
    <text x="550" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d7c5f">
      ~0% Error
    </text>
  </g>

  <!-- Footer -->
  <text x="400" y="420" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#8a8a8a">
    Yao et al. (2023) · ICLR · arXiv:2210.03629
  </text>
</svg>
