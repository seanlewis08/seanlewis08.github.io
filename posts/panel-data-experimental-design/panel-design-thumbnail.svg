<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#7eb8e0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <text x="400" y="42" text-anchor="middle" fill="url(#accent)" font-family="sans-serif" font-size="20" font-weight="bold">Panel Data &amp; Experimental Design</text>
  <text x="400" y="66" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">When Constant Autocorrelation Fails</text>

  <!-- Two ACF plots side by side -->

  <!-- LEFT: Assumed (constant) -->
  <rect x="60" y="90" width="310" height="185" rx="8" fill="#161b22" stroke="#f97583" stroke-width="1" opacity="0.7"/>
  <text x="215" y="112" text-anchor="middle" fill="#f97583" font-family="monospace" font-size="11" font-weight="bold">ASSUMED: Constant ρ</text>

  <line x1="100" y1="245" x2="330" y2="245" stroke="#30363d" stroke-width="1"/>
  <line x1="100" y1="135" x2="100" y2="245" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="262" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="8">Lag</text>
  <text x="88" y="190" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="8" transform="rotate(-90,88,190)">Corr</text>

  <!-- Flat bars -->
  <rect x="120" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>
  <rect x="150" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>
  <rect x="180" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>
  <rect x="210" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>
  <rect x="240" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>
  <rect x="270" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>
  <rect x="300" y="170" width="18" height="75" rx="2" fill="#f97583" opacity="0.6"/>

  <!-- RIGHT: Reality (decaying) -->
  <rect x="430" y="90" width="310" height="185" rx="8" fill="#161b22" stroke="#2dd4a8" stroke-width="1" opacity="0.7"/>
  <text x="585" y="112" text-anchor="middle" fill="#2dd4a8" font-family="monospace" font-size="11" font-weight="bold">REALITY: Decaying ρ</text>

  <line x1="470" y1="245" x2="700" y2="245" stroke="#30363d" stroke-width="1"/>
  <line x1="470" y1="135" x2="470" y2="245" stroke="#30363d" stroke-width="1"/>
  <text x="585" y="262" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="8">Lag</text>
  <text x="458" y="190" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="8" transform="rotate(-90,458,190)">Corr</text>

  <!-- Decaying bars -->
  <rect x="490" y="150" width="18" height="95" rx="2" fill="#2dd4a8" opacity="0.7"/>
  <rect x="520" y="170" width="18" height="75" rx="2" fill="#2dd4a8" opacity="0.65"/>
  <rect x="550" y="185" width="18" height="60" rx="2" fill="#2dd4a8" opacity="0.55"/>
  <rect x="580" y="200" width="18" height="45" rx="2" fill="#2dd4a8" opacity="0.45"/>
  <rect x="610" y="210" width="18" height="35" rx="2" fill="#2dd4a8" opacity="0.4"/>
  <rect x="640" y="220" width="18" height="25" rx="2" fill="#2dd4a8" opacity="0.35"/>
  <rect x="670" y="228" width="18" height="17" rx="2" fill="#2dd4a8" opacity="0.3"/>

  <!-- Consequences -->
  <rect x="80" y="295" width="280" height="90" rx="8" fill="#161b22" stroke="#f97583" stroke-width="0.8" opacity="0.5"/>
  <text x="220" y="320" text-anchor="middle" fill="#f97583" font-family="monospace" font-size="10" font-weight="bold">SHORT PANELS</text>
  <text x="220" y="340" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="9">Standard formula → OVERPOWERED</text>
  <text x="220" y="358" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="9">You think power = 75%</text>
  <text x="220" y="374" text-anchor="middle" fill="#f97583" font-family="sans-serif" font-size="9">Actually power = 60%</text>

  <rect x="440" y="295" width="280" height="90" rx="8" fill="#161b22" stroke="#2dd4a8" stroke-width="0.8" opacity="0.5"/>
  <text x="580" y="320" text-anchor="middle" fill="#2dd4a8" font-family="monospace" font-size="10" font-weight="bold">LONG PANELS</text>
  <text x="580" y="340" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="9">Standard formula → UNDERPOWERED</text>
  <text x="580" y="358" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="9">You think power = 70%</text>
  <text x="580" y="374" text-anchor="middle" fill="#2dd4a8" font-family="sans-serif" font-size="9">Actually power = 85%</text>

  <rect x="100" y="408" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>