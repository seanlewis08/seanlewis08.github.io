<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#faf6f1"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Causal Forest</text>
  <text x="400" y="62" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Honest Trees + Valid Inference</text>

  <!-- Tree 1 -->
  <g transform="translate(130, 100)">
    <circle cx="0" cy="0" r="12" fill="#0d7c5f" opacity="0.15" stroke="#0d7c5f" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="-30" y2="45" stroke="#0d7c5f" stroke-width="1.2"/>
    <line x1="0" y1="12" x2="30" y2="45" stroke="#0d7c5f" stroke-width="1.2"/>
    <circle cx="-30" cy="50" r="9" fill="#0d7c5f" opacity="0.1" stroke="#0d7c5f" stroke-width="1"/>
    <circle cx="30" cy="50" r="9" fill="#0d7c5f" opacity="0.1" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="-30" y1="59" x2="-45" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="-30" y1="59" x2="-15" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="30" y1="59" x2="15" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="30" y1="59" x2="45" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <rect x="-52" y="82" width="14" height="14" rx="2" fill="#0d7c5f" opacity="0.25"/>
    <rect x="-22" y="82" width="14" height="14" rx="2" fill="#6d5acd" opacity="0.25"/>
    <rect x="8" y="82" width="14" height="14" rx="2" fill="#0d7c5f" opacity="0.25"/>
    <rect x="38" y="82" width="14" height="14" rx="2" fill="#6d5acd" opacity="0.25"/>
    <text x="0" y="115" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="9">Tree 1</text>
  </g>

  <!-- Tree 2 -->
  <g transform="translate(300, 100)">
    <circle cx="0" cy="0" r="12" fill="#0d7c5f" opacity="0.15" stroke="#0d7c5f" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="-30" y2="45" stroke="#0d7c5f" stroke-width="1.2"/>
    <line x1="0" y1="12" x2="30" y2="45" stroke="#0d7c5f" stroke-width="1.2"/>
    <circle cx="-30" cy="50" r="9" fill="#0d7c5f" opacity="0.1" stroke="#0d7c5f" stroke-width="1"/>
    <circle cx="30" cy="50" r="9" fill="#0d7c5f" opacity="0.1" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="-30" y1="59" x2="-45" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="-30" y1="59" x2="-15" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="30" y1="59" x2="15" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="30" y1="59" x2="45" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <rect x="-52" y="82" width="14" height="14" rx="2" fill="#6d5acd" opacity="0.25"/>
    <rect x="-22" y="82" width="14" height="14" rx="2" fill="#0d7c5f" opacity="0.25"/>
    <rect x="8" y="82" width="14" height="14" rx="2" fill="#6d5acd" opacity="0.25"/>
    <rect x="38" y="82" width="14" height="14" rx="2" fill="#0d7c5f" opacity="0.25"/>
    <text x="0" y="115" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="9">Tree 2</text>
  </g>

  <!-- Ellipsis -->
  <text x="420" y="155" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="24">...</text>

  <!-- Tree B -->
  <g transform="translate(530, 100)">
    <circle cx="0" cy="0" r="12" fill="#0d7c5f" opacity="0.15" stroke="#0d7c5f" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="-30" y2="45" stroke="#0d7c5f" stroke-width="1.2"/>
    <line x1="0" y1="12" x2="30" y2="45" stroke="#0d7c5f" stroke-width="1.2"/>
    <circle cx="-30" cy="50" r="9" fill="#0d7c5f" opacity="0.1" stroke="#0d7c5f" stroke-width="1"/>
    <circle cx="30" cy="50" r="9" fill="#0d7c5f" opacity="0.1" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="-30" y1="59" x2="-45" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="-30" y1="59" x2="-15" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="30" y1="59" x2="15" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <line x1="30" y1="59" x2="45" y2="82" stroke="#0d7c5f" stroke-width="1"/>
    <rect x="-52" y="82" width="14" height="14" rx="2" fill="#0d7c5f" opacity="0.25"/>
    <rect x="-22" y="82" width="14" height="14" rx="2" fill="#0d7c5f" opacity="0.25"/>
    <rect x="8" y="82" width="14" height="14" rx="2" fill="#6d5acd" opacity="0.25"/>
    <rect x="38" y="82" width="14" height="14" rx="2" fill="#6d5acd" opacity="0.25"/>
    <text x="0" y="115" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="9">Tree B</text>
  </g>

  <!-- Arrow down to aggregate -->
  <line x1="330" y1="230" x2="330" y2="270" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Aggregate box -->
  <rect x="180" y="275" width="300" height="50" rx="8" fill="#fff" stroke="#0d7c5f" stroke-width="2"/>
  <text x="330" y="297" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Average across B honest trees</text>
  <text x="330" y="315" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="11">τ̂(x) = Σ αᵢ(x) · Yᵢ</text>

  <!-- Arrow to result -->
  <line x1="330" y1="325" x2="330" y2="360" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Result -->
  <rect x="170" y="365" width="320" height="45" rx="8" fill="#0d7c5f" opacity="0.08" stroke="#0d7c5f" stroke-width="1.5"/>
  <text x="330" y="387" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="13" font-weight="600">CATE ± Confidence Interval</text>
  <text x="330" y="403" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="10">Asymptotically normal · Pointwise valid</text>

  <!-- Honesty labels -->
  <rect x="600" y="130" width="150" height="60" rx="6" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="675" y="150" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Honest Split</text>
  <rect x="615" y="160" width="50" height="12" rx="3" fill="#0d7c5f" opacity="0.2"/>
  <text x="640" y="170" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="7">Structure</text>
  <rect x="680" y="160" width="50" height="12" rx="3" fill="#6d5acd" opacity="0.2"/>
  <text x="705" y="170" text-anchor="middle" fill="#6d5acd" font-family="system-ui, sans-serif" font-size="7">Estimation</text>
  <text x="675" y="183" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="8">→ unbiased leaves</text>

  <!-- Footer -->
  <text x="400" y="440" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="11">Wager &amp; Athey (2018) · Annals of Statistics · arXiv:1510.04342</text>
</svg>
