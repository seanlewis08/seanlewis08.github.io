<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#faf6f1"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Evaluating AGENTS.md</text>
  <text x="400" y="58" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Does structured context help coding agents?</text>

  <!-- Left: Baseline bar -->
  <rect x="180" y="100" width="140" height="240" rx="6" fill="#e5e5e5" stroke="#ccc" stroke-width="1"/>
  <rect x="180" y="210" width="140" height="130" rx="0" fill="#8a8a8a" opacity="0.6"/>
  <text x="250" y="250" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="700">54.3%</text>
  <text x="250" y="275" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11">resolve rate</text>
  <text x="250" y="360" text-anchor="middle" fill="#4a4a4a" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Baseline</text>
  <text x="250" y="376" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="10">(no AGENTS.md)</text>

  <!-- Right: Enhanced bar -->
  <rect x="420" y="100" width="140" height="240" rx="6" fill="#e5e5e5" stroke="#ccc" stroke-width="1"/>
  <rect x="420" y="160" width="140" height="180" rx="0" fill="#0d7c5f" opacity="0.75"/>
  <text x="490" y="210" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="700">61.3%</text>
  <text x="490" y="235" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11">resolve rate</text>
  <text x="490" y="360" text-anchor="middle" fill="#4a4a4a" font-family="system-ui, sans-serif" font-size="13" font-weight="600">+ AGENTS.md</text>
  <text x="490" y="376" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="10">(structured context)</text>

  <!-- Delta arrow -->
  <line x1="370" y1="200" x2="410" y2="200" stroke="#0d7c5f" stroke-width="2" marker-end="url(#greenArrow)"/>
  <defs>
    <marker id="greenArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d7c5f"/>
    </marker>
  </defs>
  <text x="390" y="190" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="14" font-weight="700">+7.0pp</text>

  <!-- File icon -->
  <g transform="translate(650, 130)">
    <rect x="0" y="0" width="60" height="75" rx="4" fill="#fff" stroke="#0d7c5f" stroke-width="1.5"/>
    <polygon points="40,0 60,20 40,20" fill="#0d7c5f" opacity="0.15" stroke="#0d7c5f" stroke-width="1"/>
    <text x="30" y="45" text-anchor="middle" fill="#0d7c5f" font-family="monospace" font-size="8" font-weight="600">AGENTS</text>
    <text x="30" y="57" text-anchor="middle" fill="#0d7c5f" font-family="monospace" font-size="8" font-weight="600">.md</text>
    <line x1="10" y1="65" x2="50" y2="65" stroke="#e5e5e5" stroke-width="1"/>
    <line x1="10" y1="35" x2="35" y2="35" stroke="#e5e5e5" stroke-width="1"/>
  </g>

  <!-- Key insight -->
  <rect x="620" y="230" width="130" height="80" rx="6" fill="#0d7c5f" opacity="0.06" stroke="#0d7c5f" stroke-width="1"/>
  <text x="685" y="252" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Biggest impact:</text>
  <text x="685" y="270" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Testing instructions</text>
  <text x="685" y="286" text-anchor="middle" fill="#4a4a4a" font-family="system-ui, sans-serif" font-size="8">+ Repo structure</text>
  <text x="685" y="300" text-anchor="middle" fill="#4a4a4a" font-family="system-ui, sans-serif" font-size="8">+ Common pitfalls</text>

  <!-- Footer -->
  <text x="400" y="420" text-anchor="middle" fill="#8a8a8a" font-family="system-ui, sans-serif" font-size="11">Gloaguen et al. (2025) · Anthropic · SWE-bench Verified</text>
</svg>
