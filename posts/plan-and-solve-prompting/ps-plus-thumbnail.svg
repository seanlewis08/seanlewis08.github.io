<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#FA8072"/>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Plan-and-Solve Prompting
  </text>

  <!-- Subtitle -->
  <text x="400" y="70" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#0d7c5f">
    Structured reasoning over step-by-step
  </text>

  <!-- Column 1: Zero-shot -->
  <g>
    <text x="130" y="105" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Zero-shot</text>

    <!-- Simple Box -->
    <rect x="100" y="115" width="60" height="50" fill="none" stroke="#4a4a4a" stroke-width="2" rx="3"/>
    <text x="130" y="147" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#4a4a4a">Q→A</text>
  </g>

  <!-- Column 2: CoT -->
  <g>
    <text x="400" y="105" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CoT</text>

    <!-- Chain of circles -->
    <circle cx="370" cy="145" r="12" fill="none" stroke="#4a4a4a" stroke-width="2"/>
    <text x="370" y="150" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#4a4a4a">1</text>

    <line x1="385" y1="145" x2="405" y2="145" stroke="#4a4a4a" stroke-width="1.5"/>

    <circle cx="420" cy="145" r="12" fill="none" stroke="#4a4a4a" stroke-width="2"/>
    <text x="420" y="150" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#4a4a4a">2</text>

    <line x1="435" y1="145" x2="455" y2="145" stroke="#4a4a4a" stroke-width="1.5"/>

    <circle cx="470" cy="145" r="12" fill="none" stroke="#4a4a4a" stroke-width="2"/>
    <text x="470" y="150" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle" fill="#4a4a4a">3</text>
  </g>

  <!-- Column 3: Plan-and-Solve+ -->
  <g>
    <text x="670" y="105" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Plan-and-Solve+</text>

    <!-- Plan Box -->
    <rect x="630" y="115" width="50" height="35" fill="none" stroke="#0d7c5f" stroke-width="2.5" rx="3"/>
    <text x="655" y="135" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#0d7c5f">Plan</text>

    <!-- Arrow down -->
    <line x1="655" y1="155" x2="655" y2="175" stroke="#0d7c5f" stroke-width="2.5"/>
    <polygon points="655,175 651,168 659,168" fill="#0d7c5f"/>

    <!-- Extract Box -->
    <rect x="630" y="175" width="50" height="35" fill="none" stroke="#0d7c5f" stroke-width="2.5" rx="3"/>
    <text x="655" y="195" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#0d7c5f">Extract</text>

    <!-- Arrow down -->
    <line x1="655" y1="215" x2="655" y2="235" stroke="#0d7c5f" stroke-width="2.5"/>
    <polygon points="655,235 651,228 659,228" fill="#0d7c5f"/>

    <!-- Solve Box -->
    <rect x="630" y="235" width="50" height="35" fill="none" stroke="#0d7c5f" stroke-width="2.5" rx="3"/>
    <text x="655" y="255" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#0d7c5f">Solve</text>
  </g>

  <!-- Callout Box -->
  <g>
    <rect x="320" y="310" width="160" height="50" fill="#0d7c5f" rx="6" opacity="0.15"/>
    <text x="400" y="345" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0d7c5f">
      76.7% Arithmetic
    </text>
  </g>

  <!-- Footer -->
  <text x="400" y="420" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#8a8a8a">
    Wang et al. (2023) · ACL · Plan-and-Solve
  </text>
</svg>
