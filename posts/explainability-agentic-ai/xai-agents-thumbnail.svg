<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#FA8072"/>

  <!-- Title Section -->
  <text x="400" y="35" font-size="32" font-weight="700" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif">
    Explainability in Agentic AI
  </text>
  <text x="400" y="60" font-size="16" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-style="italic">
    From features to actions
  </text>

  <!-- Divider line -->
  <line x1="50" y1="75" x2="750" y2="75" stroke="#ddd" stroke-width="1"/>

  <!-- LEFT PANEL: Static XAI -->
  <g id="static-panel">
    <!-- Panel background -->
    <rect x="50" y="90" width="300" height="280" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="8"/>

    <!-- Panel title -->
    <text x="200" y="125" font-size="18" font-weight="600" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif">
      Static XAI
    </text>

    <!-- Input box -->
    <rect x="70" y="145" width="120" height="50" fill="#e8e8e8" stroke="#999" stroke-width="1.5" rx="4"/>
    <text x="130" y="175" font-size="12" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-weight="500">
      Input
    </text>
    <text x="130" y="190" font-size="10" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif">
      Features
    </text>

    <!-- Arrow -->
    <path d="M 210 170 L 240 170" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead-gray)"/>

    <!-- Model box -->
    <rect x="250" y="145" width="70" height="50" fill="#e0e0e0" stroke="#999" stroke-width="1.5" rx="4"/>
    <text x="285" y="175" font-size="11" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-weight="500">
      Model
    </text>

    <!-- Arrow down -->
    <path d="M 285 205 L 285 235" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead-gray)"/>

    <!-- SHAP/LIME box -->
    <rect x="150" y="240" width="270" height="100" fill="#fff9f0" stroke="#d4a574" stroke-width="2" rx="4"/>
    <text x="285" y="260" font-size="13" font-weight="600" text-anchor="middle" fill="#d4563a" font-family="system-ui, sans-serif">
      SHAP / LIME
    </text>
    <text x="285" y="280" font-size="11" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif">
      Feature Attribution
    </text>

    <!-- Feature bars -->
    <rect x="170" y="295" width="20" height="30" fill="#d4563a" opacity="0.8"/>
    <text x="265" y="315" font-size="9" fill="#666" font-family="system-ui, sans-serif">Feature A: 45%</text>

    <rect x="200" y="300" width="16" height="25" fill="#d4563a" opacity="0.6"/>
    <text x="265" y="330" font-size="9" fill="#666" font-family="system-ui, sans-serif">Feature B: 32%</text>

    <rect x="230" y="310" width="10" height="15" fill="#d4563a" opacity="0.4"/>
    <text x="265" y="345" font-size="9" fill="#666" font-family="system-ui, sans-serif">Feature C: 15%</text>
  </g>

  <!-- RIGHT PANEL: Agentic XAI (Highlighted) -->
  <g id="agentic-panel">
    <!-- Panel background with highlight -->
    <rect x="450" y="90" width="300" height="280" fill="#e8f5e9" stroke="#0d7c5f" stroke-width="3" rx="8"/>

    <!-- Panel title -->
    <text x="600" y="125" font-size="18" font-weight="600" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif">
      Agentic XAI
    </text>

    <!-- Action chain -->
    <circle cx="470" cy="155" r="12" fill="#6d5acd" stroke="#0d7c5f" stroke-width="1.5"/>
    <text x="470" y="160" font-size="9" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-weight="600">A₁</text>

    <!-- Arrow down -->
    <path d="M 470 167 L 470 190" stroke="#0d7c5f" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>

    <!-- Observation -->
    <circle cx="470" cy="210" r="12" fill="#6d5acd" stroke="#0d7c5f" stroke-width="1.5" opacity="0.7"/>
    <text x="470" y="215" font-size="9" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-weight="600">O₁</text>

    <!-- Arrow down -->
    <path d="M 470 222 L 470 245" stroke="#0d7c5f" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>

    <!-- Action 2 -->
    <circle cx="470" cy="265" r="12" fill="#6d5acd" stroke="#0d7c5f" stroke-width="1.5"/>
    <text x="470" y="270" font-size="9" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-weight="600">A₂</text>

    <!-- Dotdotdot -->
    <text x="470" y="315" font-size="16" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif" font-weight="600">...</text>

    <!-- MEP box -->
    <rect x="500" y="155" width="230" height="160" fill="#fff" stroke="#0d7c5f" stroke-width="2" rx="4"/>

    <text x="615" y="175" font-size="12" font-weight="700" text-anchor="middle" fill="#0d7c5f" font-family="system-ui, sans-serif">
      MEP Framework
    </text>

    <!-- MEP components -->
    <rect x="510" y="190" width="210" height="28" fill="#e8f5e9" stroke="#0d7c5f" stroke-width="1" rx="2"/>
    <text x="515" y="207" font-size="10" font-weight="600" fill="#0d7c5f" font-family="system-ui, sans-serif">1. Explanation Artifact</text>

    <rect x="510" y="225" width="210" height="28" fill="#e8f5e9" stroke="#0d7c5f" stroke-width="1" rx="2"/>
    <text x="515" y="242" font-size="10" font-weight="600" fill="#0d7c5f" font-family="system-ui, sans-serif">2. Evidence & Context</text>

    <rect x="510" y="260" width="210" height="28" fill="#e8f5e9" stroke="#0d7c5f" stroke-width="1" rx="2"/>
    <text x="515" y="277" font-size="10" font-weight="600" fill="#0d7c5f" font-family="system-ui, sans-serif">3. Verification Signals</text>
  </g>

  <!-- Footer -->
  <text x="400" y="400" font-size="12" text-anchor="middle" fill="#999" font-family="system-ui, sans-serif">
    Chaduvula et al. (2026) · Vector Institute + Mayo Clinic
  </text>

  <!-- Tagline: State Tracking Consistency -->
  <rect x="50" y="410" width="700" height="30" fill="#f0f0f0" stroke="#ddd" stroke-width="1" rx="4"/>
  <text x="400" y="432" font-size="11" text-anchor="middle" fill="#1a1a1a" font-family="system-ui, sans-serif" font-weight="600">
    State Tracking Consistency: Strongest predictor of agent failure (Δ=0.333, RR=0.51)
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0d7c5f"/>
    </marker>
  </defs>
</svg>