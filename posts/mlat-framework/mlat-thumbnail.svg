<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#7eb8e0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#5ce0b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#2dd4a8" stroke-width="0.5">
    <line x1="0" y1="70" x2="800" y2="70"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="160" y1="0" x2="160" y2="420"/>
    <line x1="320" y1="0" x2="320" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="640" y1="0" x2="640" y2="420"/>
  </g>

  <!-- LLM Agent Box -->
  <rect x="60" y="130" width="200" height="160" rx="12" fill="#161b22" stroke="#2dd4a8" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="175" text-anchor="middle" fill="#2dd4a8" font-family="monospace" font-size="14" font-weight="bold">LLM AGENT</text>
  <text x="160" y="205" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Reasoning</text>
  <text x="160" y="225" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Orchestration</text>
  <text x="160" y="245" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Language</text>
  <text x="160" y="265" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Context</text>

  <!-- Arrow -->
  <line x1="270" y1="210" x2="370" y2="210" stroke="url(#arrow)" stroke-width="2.5" stroke-dasharray="8,4"/>
  <polygon points="370,203 385,210 370,217" fill="#2dd4a8"/>
  <text x="327" y="198" text-anchor="middle" fill="#5ce0b8" font-family="monospace" font-size="10">tool_call()</text>

  <!-- ML Model Box -->
  <rect x="395" y="130" width="200" height="160" rx="12" fill="#161b22" stroke="#7eb8e0" stroke-width="1.5" opacity="0.9"/>
  <text x="495" y="175" text-anchor="middle" fill="#7eb8e0" font-family="monospace" font-size="14" font-weight="bold">ML MODEL</text>
  <text x="495" y="205" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Prediction</text>
  <text x="495" y="225" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Numerical</text>
  <text x="495" y="245" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Consistent</text>
  <text x="495" y="265" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Structured</text>

  <!-- Return Arrow -->
  <line x1="385" y1="235" x2="275" y2="235" stroke="#7eb8e0" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <polygon points="275,228 260,235 275,242" fill="#7eb8e0" opacity="0.6"/>
  <text x="327" y="253" text-anchor="middle" fill="#7eb8e0" font-family="monospace" font-size="10" opacity="0.7">prediction</text>

  <!-- Output Box -->
  <rect x="630" y="155" width="120" height="110" rx="10" fill="#161b22" stroke="#5ce0b8" stroke-width="1" opacity="0.6"/>
  <text x="690" y="195" text-anchor="middle" fill="#5ce0b8" font-family="monospace" font-size="11" font-weight="bold">OUTPUT</text>
  <text x="690" y="220" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Contextualized</text>
  <text x="690" y="238" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Proposal</text>

  <!-- Arrow to Output -->
  <line x1="600" y1="210" x2="625" y2="210" stroke="#5ce0b8" stroke-width="1.5" opacity="0.5"/>
  <polygon points="625,205 635,210 625,215" fill="#5ce0b8" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" fill="url(#accent)" font-family="sans-serif" font-size="26" font-weight="bold">MLAT Framework</text>
  <text x="400" y="85" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="14">Machine Learning as a Tool for LLM Agents</text>

  <!-- Bottom accent line -->
  <rect x="100" y="390" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>