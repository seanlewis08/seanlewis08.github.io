<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4a8"/>
      <stop offset="100%" stop-color="#7eb8e0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="url(#accent)" font-family="sans-serif" font-size="20" font-weight="bold">Where Does Your Uncertainty Come From?</text>
  <text x="400" y="65" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">Sampling-Based vs Design-Based Standard Errors</text>

  <!-- Two sources diagram -->

  <!-- Sampling box -->
  <rect x="80" y="90" width="280" height="130" rx="10" fill="#161b22" stroke="#7eb8e0" stroke-width="1.2"/>
  <text x="220" y="118" text-anchor="middle" fill="#7eb8e0" font-family="monospace" font-size="13" font-weight="bold">SAMPLING</text>
  <text x="220" y="140" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Random draw from population</text>
  <text x="220" y="158" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Different sample → different β̂</text>
  <text x="220" y="182" text-anchor="middle" fill="#e6db74" font-family="monospace" font-size="10">Scales as (1 - ρ)</text>
  <text x="220" y="200" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="9">→ 0 when you have the full population</text>

  <!-- Design box -->
  <rect x="440" y="90" width="280" height="130" rx="10" fill="#161b22" stroke="#2dd4a8" stroke-width="1.2"/>
  <text x="580" y="118" text-anchor="middle" fill="#2dd4a8" font-family="monospace" font-size="13" font-weight="bold">DESIGN</text>
  <text x="580" y="140" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Random treatment assignment</text>
  <text x="580" y="158" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Different assignment → different τ̂</text>
  <text x="580" y="182" text-anchor="middle" fill="#e6db74" font-family="monospace" font-size="10">Present even at ρ = 1</text>
  <text x="580" y="200" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="9">→ 0 only if treatment effects are constant</text>

  <!-- Plus sign -->
  <text x="400" y="165" text-anchor="middle" fill="#6e7681" font-family="sans-serif" font-size="24">+</text>

  <!-- Formula -->
  <rect x="180" y="240" width="440" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="266" text-anchor="middle" fill="#c9d1d9" font-family="monospace" font-size="14">V(β̂) = (1 - ρ)·V_sampling + V_design</text>

  <!-- Bar chart: SE ratio at different rho values -->
  <text x="400" y="310" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">Conventional SE / Correct SE (descriptive estimand)</text>

  <!-- Bars showing overstatement -->
  <text x="140" y="340" text-anchor="end" fill="#6e7681" font-family="monospace" font-size="9">ρ = 0.1</text>
  <rect x="150" y="328" width="52" height="16" rx="3" fill="#7eb8e0" opacity="0.4"/>
  <text x="207" y="340" fill="#8b949e" font-family="monospace" font-size="8">1.05×</text>

  <text x="140" y="360" text-anchor="end" fill="#6e7681" font-family="monospace" font-size="9">ρ = 0.5</text>
  <rect x="150" y="348" width="100" height="16" rx="3" fill="#7eb8e0" opacity="0.55"/>
  <text x="255" y="360" fill="#8b949e" font-family="monospace" font-size="8">1.41×</text>

  <text x="140" y="380" text-anchor="end" fill="#6e7681" font-family="monospace" font-size="9">ρ = 0.9</text>
  <rect x="150" y="368" width="220" height="16" rx="3" fill="#f97583" opacity="0.6"/>
  <text x="375" y="380" fill="#f97583" font-family="monospace" font-size="8">3.16×</text>

  <text x="140" y="400" text-anchor="end" fill="#6e7681" font-family="monospace" font-size="9">ρ = 1.0</text>
  <rect x="150" y="388" width="430" height="16" rx="3" fill="#f85149" opacity="0.7"/>
  <text x="585" y="400" fill="#f85149" font-family="monospace" font-size="8">∞ (SE should be 0!)</text>

  <!-- Bottom accent -->
  <rect x="100" y="414" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>